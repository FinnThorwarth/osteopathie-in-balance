<!DOCTYPE html>
<html>
<head>
    <title>Manual Form Test</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        iframe { width: 100%; height: 600px; border: 1px solid #ddd; }
        .info { background: #f0f0f0; padding: 15px; margin: 20px 0; border-radius: 5px; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Contact Form Manual Test</h1>
        
        <div class="info">
            <h2>Test Instructions:</h2>
            <ol>
                <li>The form below is loaded from your Neos site</li>
                <li>Fill in the form with test data (or click "Auto Fill")</li>
                <li>Submit the form</li>
                <li>Check Mailhog at <a href="http://localhost:8025" target="_blank">http://localhost:8025</a> for the email</li>
            </ol>
        </div>
        
        <div>
            <button onclick="autoFill()">Auto Fill Form</button>
            <button onclick="clearMailhog()">Clear Mailhog</button>
            <button onclick="checkMailhog()">Check Mailhog</button>
            <button onclick="document.getElementById('site-frame').src = document.getElementById('site-frame').src">Reload Frame</button>
        </div>
        
        <div id="status" style="margin: 10px 0;"></div>
        
        <iframe id="site-frame" src="http://0.0.0.0:8081/"></iframe>
        
        <div class="info">
            <h3>Mailhog Status:</h3>
            <div id="mailhog-status">Click "Check Mailhog" to see email count</div>
        </div>
    </div>
    
    <script>
        function autoFill() {
            const iframe = document.getElementById('site-frame');
            const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
            
            try {
                // Find form fields
                const nameField = iframeDoc.querySelector('input[name*="name"]');
                const phoneField = iframeDoc.querySelector('input[name*="telefon"]');
                const emailField = iframeDoc.querySelector('input[name*="email"]');
                const messageField = iframeDoc.querySelector('textarea[name*="nachricht"]');
                
                if (nameField) nameField.value = 'Test User ' + Date.now();
                if (phoneField) phoneField.value = '+49 123 456789';
                if (emailField) emailField.value = 'test@example.com';
                if (messageField) messageField.value = 'Test message sent at ' + new Date().toLocaleString();
                
                document.getElementById('status').innerHTML = '<span class="success">✓ Form filled with test data</span>';
            } catch (e) {
                document.getElementById('status').innerHTML = '<span class="error">✗ Could not access form (CORS restriction)</span>';
            }
        }
        
        function checkMailhog() {
            fetch('http://localhost:8025/api/v2/messages')
                .then(response => response.json())
                .then(data => {
                    const status = document.getElementById('mailhog-status');
                    status.innerHTML = `
                        <strong>Total Emails:</strong> ${data.total}<br>
                        ${data.total > 0 ? '<span class="success">✓ Emails are being caught!</span>' : '<span>No emails yet</span>'}
                    `;
                    
                    if (data.items && data.items.length > 0) {
                        const latest = data.items[0];
                        status.innerHTML += `<br><br><strong>Latest Email:</strong><br>
                            From: ${latest.From ? latest.From.Mailbox + '@' + latest.From.Domain : 'N/A'}<br>
                            To: ${latest.To && latest.To[0] ? latest.To[0].Mailbox + '@' + latest.To[0].Domain : 'N/A'}<br>
                            Subject: ${latest.Content.Headers.Subject ? latest.Content.Headers.Subject[0] : 'N/A'}
                        `;
                    }
                })
                .catch(error => {
                    document.getElementById('mailhog-status').innerHTML = '<span class="error">Could not connect to Mailhog</span>';
                });
        }
        
        function clearMailhog() {
            fetch('http://localhost:8025/api/v1/messages', { method: 'DELETE' })
                .then(() => {
                    document.getElementById('mailhog-status').innerHTML = '<span class="success">✓ Mailhog cleared</span>';
                })
                .catch(error => {
                    document.getElementById('mailhog-status').innerHTML = '<span class="error">Could not clear Mailhog</span>';
                });
        }
        
        // Auto-check Mailhog on load
        setTimeout(checkMailhog, 1000);
    </script>
</body>
</html>
