version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8081:80"
    volumes:
      - ./:/app
      - ./Data/Persistent:/data
    environment:
      FLOW_CONTEXT: Development/Docker
      FLOW_REWRITEURLS: 1
    depends_on:
      - db
    networks:
      - neos-network

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: neos
      MYSQL_DATABASE: caspary_neos
      MYSQL_USER: neos
      MYSQL_PASSWORD: neos
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - neos-network
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  node:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./DistributionPackages/Caspary.Site:/app
    command: sh -c "npm install && npm run dev"
    ports:
      - "5173:5173"
    networks:
      - neos-network

volumes:
  db_data:

networks:
  neos-network:
    driver: bridge