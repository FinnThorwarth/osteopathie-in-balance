'Caspary.Site:Content.HeroSection':
  superTypes:
    'Neos.Neos:Content': true
  ui:
    label: 'Hero Section'
    icon: 'fas fa-image'
    inspector:
      groups:
        hero:
          label: 'Hero Settings'
          position: 5
  properties:
    backgroundImage:
      type: Neos\Media\Domain\Model\ImageInterface
      ui:
        label: 'Background Image'
        inspector:
          group: 'hero'
    title:
      type: string
      ui:
        label: 'Title'
        inspector:
          group: 'hero'
    subtitle:
      type: string
      ui:
        label: 'Subtitle'
        inspector:
          group: 'hero'
    overlayOpacity:
      type: string
      defaultValue: '0.5'
      ui:
        label: 'Overlay Opacity'
        inspector:
          group: 'hero'
          editor: 'Neos.Neos/Inspector/Editors/SelectBoxEditor'
          editorOptions:
            values:
              '0':
                label: 'None'
              '0.3':
                label: 'Light'
              '0.5':
                label: 'Medium'
              '0.7':
                label: 'Dark'