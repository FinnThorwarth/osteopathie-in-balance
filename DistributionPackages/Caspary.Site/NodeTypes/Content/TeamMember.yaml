'Caspary.Site:Content.TeamMember':
  superTypes:
    'Neos.Neos:Content': true
  ui:
    label: 'Teamkachel'
    icon: 'icon-user'
    group: 'caspary'
    inspector:
      groups:
        content:
          label: 'Content'
          position: 10
  options:
    fusion:
      prototypeGenerator: null
  search:
    searchNodeType: false
  label: "${node.properties.name ? 'Teamkachel (' + node.properties.name + ')' : 'Teamkachel'}"
  properties:
    name:
      type: string
      ui:
        label: 'Name'
        reloadIfChanged: true
        inlineEditable: true
        inline:
          editorOptions:
            placeholder: 'Name'
        inspector:
          group: 'content'
          editor: 'Neos.Neos/Inspector/Editors/TextFieldEditor'
    position:
      type: string
      ui:
        label: 'Position / Rolle'
        reloadIfChanged: true
        inlineEditable: true
        inline:
          editorOptions:
            placeholder: 'Position / Rolle'
        inspector:
          group: 'content'
          editor: 'Neos.Neos/Inspector/Editors/TextFieldEditor'
    pronouns:
      type: string
      ui:
        label: 'Pronomen'
        reloadIfChanged: true
        inlineEditable: true
        inline:
          editorOptions:
            placeholder: 'Pronomen'
        inspector:
          group: 'content'
          editor: 'Neos.Neos/Inspector/Editors/TextFieldEditor'
          editorOptions:
            placeholder: 'e.g. sie/ihr, er/ihm, keine'
    image:
      type: 'Neos\Media\Domain\Model\ImageInterface'
      ui:
        label: 'Foto'
        reloadIfChanged: true
        inline:
          editorOptions:
            placeholder: 'Foto'
        inspector:
          group: 'content'
