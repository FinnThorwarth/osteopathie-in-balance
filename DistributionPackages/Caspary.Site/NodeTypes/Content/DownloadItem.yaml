'Caspary.Site:Content.DownloadItem':
  superTypes:
    'Neos.Neos:Content': true
  ui:
    label: 'Download Element'
    icon: 'icon-download'
    position: 50
    group: 'media'
    inlineEditable: true
    inspector:
      groups:
        download:
          label: 'Download'
          position: 10
  properties:
    title:
      type: string
      defaultValue: ''
      ui:
        inlineEditable: true
        inline:
          editorOptions:
            placeholder: 'Titel des Downloads'
            autoparagraph: false
    file:
      type: Neos\Media\Domain\Model\Asset
      ui:
        label: 'Datei'
        inspector:
          group: 'download'
          position: 10
          editor: 'Neos.Neos/Inspector/Editors/AssetEditor'
          editorOptions:
            features:
              upload: true
              mediaBrowser: true
            accept: 'application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document,application/vnd.ms-excel,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'
