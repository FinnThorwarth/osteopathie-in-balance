'Caspary.Site:Content.Text':
  superTypes:
    'Neos.Neos:Content': true
  ui:
    label: 'Text'
    icon: 'icon-align-left'
    position: 10
    group: 'general'
    inspector:
      groups:
        options:
          label: 'Optionen'
          position: 10
  properties:
    columnLayout:
      type: string
      defaultValue: ''
      ui:
        label: 'Spaltenaufteilung'
        reloadIfChanged: true
        inspector:
          group: 'options'
          position: 10
          editor: 'Neos.Neos/Inspector/Editors/SelectBoxEditor'
          editorOptions:
            values:
              '':
                label: 'Eine Spalte (volle Breite)'
              'two-columns':
                label: 'Zwei Spalten (50|50)'
              'three-columns':
                label: 'Drei Spalten (33|33|33)'
    heading1:
      type: string
      ui:
        inlineEditable: true
        inline:
          editorOptions:
            placeholder: 'Überschrift Spalte 1'
            formatting:
              h2: true
              h3: true
              h4: true
    heading2:
      type: string
      ui:
        inlineEditable: true
        inline:
          editorOptions:
            placeholder: 'Überschrift Spalte 2'
            formatting:
              h2: true
              h3: true
              h4: true
    heading3:
      type: string
      ui:
        inlineEditable: true
        inline:
          editorOptions:
            placeholder: 'Überschrift Spalte 3'
            formatting:
              h2: true
              h3: true
              h4: true
    text1:
      type: string
      ui:
        inlineEditable: true
        inline:
          editorOptions:
            placeholder: 'Text Spalte 1'
            autoparagraph: true
            formatting:
              strong: true
              em: true
              a: true
              ul: true
              ol: true
    text2:
      type: string
      ui:
        inlineEditable: true
        inline:
          editorOptions:
            placeholder: 'Text Spalte 2'
            autoparagraph: true
            formatting:
              strong: true
              em: true
              a: true
              ul: true
              ol: true
    text3:
      type: string
      ui:
        inlineEditable: true
        inline:
          editorOptions:
            placeholder: 'Text Spalte 3'
            autoparagraph: true
            formatting:
              strong: true
              em: true
