'Caspary.Site:Content.Button':
  superTypes:
    'Neos.Neos:Content': true
  ui:
    label: 'Button'
    icon: 'icon-link'
    position: 40
    group: 'general'
    inlineEditable: true
    inspector:
      groups:
        link:
          label: 'Link'
          position: 10
        style:
          label: 'Stil'
          position: 20
  properties:
    label:
      type: string
      defaultValue: ''
      ui:
        inlineEditable: true
        inline:
          editorOptions:
            placeholder: 'Button Text'
            autoparagraph: false
    link:
      type: string
      ui:
        label: 'Linkziel'
        inspector:
          group: 'link'
          position: 10
          editor: 'Neos.Neos/Inspector/Editors/LinkEditor'
    target:
      type: string
      defaultValue: ''
      ui:
        label: 'Link öffnen in'
        inspector:
          group: 'link'
          position: 20
          editor: 'Neos.Neos/Inspector/Editors/SelectBoxEditor'
          editorOptions:
            allowEmpty: true
            values:
              '':
                label: 'Gleichem Fenster'
              '_blank':
                label: 'Neuem Fenster'
    buttonStyle:
      type: string
      defaultValue: 'primary'
      ui:
        label: 'Button Stil'
        reloadIfChanged: true
        inspector:
          group: 'style'
          position: 10
          editor: 'Neos.Neos/Inspector/Editors/SelectBoxEditor'
          editorOptions:
            values:
              'primary':
                label: 'Primär (gefüllt)'
              'secondary':
                label: 'Sekundär (Outline)'
              'ghost':
                label: 'Ghost (nur Text)'
    alignment:
      type: string
      defaultValue: 'left'
      ui:
        label: 'Ausrichtung'
        reloadIfChanged: true
        inspector:
          group: 'style'
          position: 20
          editor: 'Neos.Neos/Inspector/Editors/SelectBoxEditor'
          editorOptions:
            values:
              'left':
                label: 'Links'
              'center':
                label: 'Zentriert'
              'right':
                label: 'Rechts'