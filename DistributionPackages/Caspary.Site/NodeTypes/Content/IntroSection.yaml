'Caspary.Site:Content.IntroSection':
  superTypes:
    'Neos.Neos:Content': true
  ui:
    label: 'Einstieg'
    icon: 'icon-file-text-o'
    group: 'caspary'
    inspector:
      groups:
        content:
          label: 'Content'
          position: 10
        layout:
          label: 'Layout'
          position: 20
  childNodes:
    header:
      type: 'Caspary.Site:Content.SectionHeader'
  properties:
    sectionTitle:
      type: string
      ui:
        inlineEditable: true
        inline:
          editorOptions:
            placeholder: 'Einstiegstext'
    subtitle:
      type: string
      ui:
        inlineEditable: true
        inline:
          editorOptions:
            placeholder: 'Untertitel'
    leftColumnText:
      type: string
      ui:
        inlineEditable: true
        inline:
          editorOptions:
            formatting:
              strong: true
              em: true
              p: true
              h3: true
              ul: true
              ol: true
            linking:
              a: true
            placeholder: 'Text linke Spalte'
    rightColumnText:
      type: string
      ui:
        inlineEditable: true
        inline:
          editorOptions:
            formatting:
              strong: true
              em: true
              p: true
              h3: true
              ul: true
              ol: true
            linking:
              a: true
            placeholder: 'Text rechte Spalte'
    columnMode:
      type: string
      defaultValue: 'two-columns'
      ui:
        label: 'Spaltenmodus'
        reloadIfChanged: true
        inspector:
          group: 'layout'
          editor: 'Neos.Neos/Inspector/Editors/SelectBoxEditor'
          editorOptions:
            values:
              'one-column':
                label: 'Eine Spalte'
              'two-columns':
                label: 'Zwei Spalten'
