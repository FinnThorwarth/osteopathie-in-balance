'Caspary.Site:Content.TwoColumnSection':
  superTypes:
    'Neos.Neos:Content': true
  label: "${node.properties.headline ? 'Zweispaltiger Abschnitt (' + node.properties.headline + ')' : 'Zweispaltiger Abschnitt'}"
  ui:
    label: 'Zweispaltiger Abschnitt'
    icon: 'icon-columns'
    group: 'caspary'
    inspector:
      groups:
        content:
          label: 'Inhalt'
          position: 10
        appearance:
          label: 'Aussehen'
          position: 20
  properties:
    headline:
      type: string
      ui:
        label: 'Überschrift'
        reloadIfChanged: true
        inlineEditable: true
        inline:
          editorOptions:
            placeholder: 'Überschrift'


    leftContent:
      type: string
      ui:
        label: 'Inhalt linke Spalte'
        reloadIfChanged: false
        inlineEditable: true
        inline:
          editorOptions:
            placeholder: 'Inhalt linke Spalte'
            autoparagraph: true
            formatting:
              p: true
              strong: true
              em: true
              u: true
              h3: true
              ul: true
              ol: true
              a: true
            linking:
              anchor: true
              title: true
              relNofollow: true
              targetBlank: true
    rightContent:
      type: string
      ui:
        label: 'Inhalt rechte Spalte'
        reloadIfChanged: false
        inlineEditable: true
        inline:
          editorOptions:
            placeholder: 'Inhalt rechte Spalte'
            autoparagraph: true
            formatting:
              p: true
              strong: true
              em: true
              u: true
              h3: true
              ul: true
              ol: true
              a: true
            linking:
              anchor: true
              title: true
              relNofollow: true
              targetBlank: true
    showDivider:
      type: boolean
      defaultValue: true
      ui:
        label: 'Zeige Trennlinie'
        reloadIfChanged: true
        inspector:
          group: 'appearance'
