"Caspary.Site:Document.AbstractPage":
  abstract: true
  superTypes:
    "Neos.Neos:Document": true
    "Caspary.Site:Mixin.Image": true
    'Neos.Seo:NoindexMixin': true # noindex gesetzt
  childNodes:
    main:
      type: "Neos.Neos:ContentCollection"
      constraints:
        nodeTypes:
          "*": false
          "Caspary.Site:Content.Image.Hero": true
          "Caspary.Site:Content.IntroSection": true
          "Caspary.Site:Content.Text": true
          "Caspary.Site:Content.Headline": true
          "Caspary.Site:Content.TextImage": true
          "Caspary.Site:Content.Accordion": true
          "Caspary.Site:Content.ImageSlider": false
          "Caspary.Site:Content.Button": false
          "Caspary.Site:Content.TeamSection": true

  constraints:
    nodeTypes:
      "Caspary.Site:Document.Homepage": false
      "Caspary.Site:Constraint.Document.Restricted": false

  properties:
    footerInfoLeft:
      type: string
      ui:
        inlineEditable: true
        inline:
          editorOptions:
            inlineStyling:
              linkStyle: true
            preset: "text.free"
            formatting:
              strong: true
              em: true
              sub: true
              sup: true
              p: false
              h1: false
              h2: false
              h3: false
              pre: false
              ol: true
              ul: true
              a: true
            placeholder: Footer Inhalt
    footerInfoRight:
      type: string
      ui:
        inlineEditable: true
        inline:
          editorOptions:
            inlineStyling:
              linkStyle: true
            preset: "text.free"
            formatting:
              strong: true
              em: true
              sub: true
              sup: true
              p: false
              h1: false
              h2: false
              h3: false
              pre: false
              ol: true
              ul: true
              a: true
            placeholder: Footer Inhalt
