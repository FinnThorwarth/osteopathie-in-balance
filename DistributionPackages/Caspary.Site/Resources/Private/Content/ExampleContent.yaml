# Example content structure for Caspary Bestattungen
# This file shows how to create pages and content in Neos
# Use the Neos backend to create actual content

# Homepage structure
homepage:
  type: 'Caspary.Site:Document.HomePage'
  properties:
    title: 'Startseite'
    metaDescription: 'Caspary Bestattungen Bremen - Wir begleiten Sie in schweren Zeiten'
  children:
    heroSection:
      type: 'Caspary.Site:Content.HeroSection'
      properties:
        title: 'Ein Leben ist vielseitig, einzigartig und wertvoll'
        subtitle: 'Der Abschied davon sollte es ebenfalls sein.'
        overlayOpacity: '0.5'
    
    introText:
      type: 'Caspary.Site:Content.TextSection'
      properties:
        headline: 'Willkommen bei Caspary Bestattungen'
        subheadline: 'Menschen zu begleiten, die Abschied nehmen müssen, ist für uns eine Aufgabe, der wir mit Respekt, Achtsamkeit und Empathie begegnen.'
        text: 'Unsere Arbeit verstehen wir als Unterstützungsangebot in einer ganz besonderen Zeit und als Würdigung des Lebens über den Tod hinaus.'
        alignment: 'center'
        backgroundColor: 'white'
    
    serviceGrid:
      type: 'Caspary.Site:Content.ServiceGrid'
      properties:
        headline: 'Unsere Leistungen'
        subheadline: 'Wir begleiten Sie in schweren Zeiten'
        backgroundColor: 'gray'
      children:
        service1:
          type: 'Caspary.Site:Content.ServiceCard'
          properties:
            title: 'Bestattungsarten'
            description: 'Erd-, Feuer-, See- und Baumbestattungen nach Ihren Wünschen'
            link: '/leistungen/bestattungsarten'
        
        service2:
          type: 'Caspary.Site:Content.ServiceCard'
          properties:
            title: 'Trauerbegleitung'
            description: 'Persönliche Betreuung und Unterstützung in der Trauerzeit'
            link: '/leistungen/trauerbegleitung'
        
        service3:
          type: 'Caspary.Site:Content.ServiceCard'
          properties:
            title: 'Vorsorge'
            description: 'Bestattungsvorsorge für ein beruhigendes Gefühl'
            link: '/leistungen/vorsorge'

# Trauerfall page
trauerfallPage:
  type: 'Caspary.Site:Document.StandardPage'
  properties:
    title: 'Im Trauerfall'
    subtitle: 'Wir sind für Sie da'
    uriPathSegment: 'trauerfall'
  children:
    content:
      type: 'Caspary.Site:Content.TwoColumnSection'
      properties:
        headline: 'Im Trauerfall'
        subheadline: 'Wenn ein Mensch gestorben ist, beginnt für die Hinterbliebenen eine besondere „Schleusenzeit", der Zeitraum zwischen Tod und Bestattung.'
        leftContent: |
          <p>Zum einen trauern Sie und die Zeit scheint still zu stehen. Zum anderen ist nun viel zu entscheiden und zu organisieren. Das Nebeneinander von Innehalten und Agieren kann herausfordernd sein.</p>
          <p>Wir möchten die nötige Entschleunigung herstellen und Ihnen helfen, alle wichtigen Schritte zu gehen und gleichzeitig Raum für Ihre Bedürfnisse zu finden.</p>
        rightContent: |
          <p>Für Ihren persönlichen Abschied, für das Zuwenden zu Ihrem verstorbenen Menschen, für Überlegungen und Planung der Trauerfeier und Beisetzung.</p>
          <p>Sie können Ihre Hausärztin/ Ihren Hausarzt oder den ärztlichen Bereitschaftsdienst anrufen. Wenn das Sterben in der Nacht geschieht, ist es aus unserer Sicht wichtig, in Ruhe Morgen tätig zu werden.</p>
        backgroundColor: 'white'

# Team page
teamPage:
  type: 'Caspary.Site:Document.StandardPage'
  properties:
    title: 'Unser Team'
    subtitle: 'Menschen, die für Sie da sind'
    uriPathSegment: 'team'

# Contact page
kontaktPage:
  type: 'Caspary.Site:Document.StandardPage'
  properties:
    title: 'Kontakt'
    subtitle: 'Wir sind für Sie erreichbar'
    uriPathSegment: 'kontakt'