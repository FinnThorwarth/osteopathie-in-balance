'Caspary.Site:Content.TextModule':
  superTypes:
    'Neos.Neos:Content': true
  ui:
    label: 'Text Modul'
    icon: 'icon-align-left'
    group: 'caspary'
    inspector:
      groups:
        content:
          label: 'Inhalt'
          position: 10
        layout:
          label: 'Layout'
          position: 20
  properties:
    columnLayout:
      type: string
      defaultValue: 'single'
      ui:
        label: 'Spalten-Layout'
        reloadIfChanged: true
        inspector:
          group: 'layout'
          editor: 'Neos.Neos/Inspector/Editors/SelectBoxEditor'
          editorOptions:
            values:
              single:
                label: 'Einspaltig'
              double:
                label: 'Zweispaltig'

    leftColumnContent:
      type: string
      ui:
        label: 'Linke Spalte'
        reloadIfChanged: true
        inlineEditable: true
        inline:
          editor: 'Neos.Neos/Inspector/Editors/RichTextEditor'
          editorOptions:
            placeholder: 'Text eingeben...'
            formatting:
              strong: true
              em: true
              u: true
              p: true
              h2: true
              h3: true
              h4: true
              ul: true
              ol: true
              a: true
              sub: true
              sup: true

    rightColumnContent:
      type: string
      ui:
        label: 'Rechte Spalte'
        reloadIfChanged: true
        inlineEditable: true
        inline:
          editor: 'Neos.Neos/Inspector/Editors/RichTextEditor'
          editorOptions:
            placeholder: 'Inhalt rechte Spalte...'
            formatting:
              strong: true
              em: true
              u: true
              p: true
              h2: true
              h3: true
              h4: true
              ul: true
              ol: true
              a: true
              sub: true
              sup: true
