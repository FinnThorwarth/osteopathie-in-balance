'Caspary.Site:Content.TextSection':
  superTypes:
    'Neos.Neos:Content': true
  ui:
    label: 'Text Section'
    icon: 'icon-align-left'
    group: 'caspary'
    inspector:
      groups:
        content:
          label: 'Content'
          position: 10
        appearance:
          label: 'Appearance'
          position: 20
  properties:
    headline:
      type: string
      ui:
        label: 'Headline'
        reloadIfChanged: true
        inspector:
          group: 'content'
    subheadline:
      type: string
      ui:
        label: 'Subheadline'
        reloadIfChanged: true
        inspector:
          group: 'content'
    text:
      type: string
      ui:
        label: 'Text'
        reloadIfChanged: true
        inspector:
          group: 'content'
          editor: 'Neos.Neos/Inspector/Editors/RichTextEditor'
          editorOptions:
            formatting:
              strong: true
              em: true
              p: true
              h3: true
              ul: true
              ol: true
              a: true
    alignment:
      type: string
      defaultValue: 'left'
      ui:
        label: 'Alignment'
        reloadIfChanged: true
        inspector:
          group: 'appearance'
          editor: 'Neos.Neos/Inspector/Editors/SelectBoxEditor'
          editorOptions:
            values:
              'left':
                label: 'Left'
              'center':
                label: 'Center'
    backgroundColor:
      type: string
      defaultValue: 'white'
      ui:
        label: 'Background Color'
        reloadIfChanged: true
        inspector:
          group: 'appearance'
          editor: 'Neos.Neos/Inspector/Editors/SelectBoxEditor'
          editorOptions:
            values:
              'white':
                label: 'White'
              'gray':
                label: 'Gray'