'Caspary.Site:Document.Author':
  superTypes:
    'Neos.Neos:Document': true
    'Neos.Seo:NoindexMixin': true  # Nicht von Suchmaschinen indexieren
  ui:
    label: 'Autor'
    icon: 'icon-user'
    group: 'general'
    inspector:
      groups:
        author:
          label: 'Autor-Informationen'
          position: 100
          icon: 'icon-user'
        social:
          label: 'Social Media'
          position: 200
          icon: 'icon-share'
    # Autoren sollen nur im AuthorsContainer erstellt werden können
    creationDialog:
      elements:
        title:
          type: string
          ui:
            label: 'Name des Autors'
            editor: 'Neos.Neos/Inspector/Editors/TextFieldEditor'
          validation:
            'Neos.Neos/Validation/NotEmptyValidator': []

  # Main Content Collection explizit deaktivieren
  childNodes:
    main:
      type: null  # Entfernt die main ContentCollection
  
  # Constraints - Autor-Seiten können nur bestimmte Inhalte haben
  constraints:
    nodeTypes:
      '*': false  # Keine Unterseiten erlaubt

  # Options - zur besseren Organisation
  options:
    # Autoren sollen nur im Container erstellt werden
    grandparentNodeType: 'Caspary.Site:Document.AuthorsContainer'
  properties:
    # Title wird im Creation Dialog gesetzt
    title:
      type: string
      ui:
        label: 'Titel'
        inspector:
          group: 'document'
          position: 10
    
    # Standardmäßig versteckt
    _hidden:
      type: boolean
      defaultValue: true
      ui:
        label: 'Seite verstecken'
        help:
          message: 'Autorenseiten sind nur für die Backend-Verwaltung'

    _hiddenInIndex:
      type: boolean
      defaultValue: true

    # SEO: Nicht indexieren
    metaRobotsNoindex:
      defaultValue: true

    metaRobotsNofollow:
      defaultValue: true

    # Aus Sitemap ausschließen
    xmlSitemapPriority:
      defaultValue: 0

    xmlSitemapChangeFrequency:
      defaultValue: 'never'

    fullName:
      type: string
      ui:
        label: 'Vollständiger Name'
        reloadIfChanged: true
        inspector:
          group: 'author'
          position: 10
      validation:
        'Neos.Neos/Validation/NotEmptyValidator': []

    jobTitle:
      type: string
      ui:
        label: 'Position/Titel'
        inspector:
          group: 'author'
          position: 20

    bio:
      type: string
      ui:
        label: 'Biografie'
        inspector:
          group: 'author'
          position: 30
          editor: 'Neos.Neos/Inspector/Editors/TextAreaEditor'
          editorOptions:
            rows: 5

    email:
      type: string
      ui:
        label: 'E-Mail'
        inspector:
          group: 'author'
          position: 40
      validation:
        'Neos.Neos/Validation/EmailAddressValidator': []

    phone:
      type: string
      ui:
        label: 'Telefon'
        inspector:
          group: 'author'
          position: 50

    profileImage:
      type: 'Neos\Media\Domain\Model\ImageInterface'
      ui:
        label: 'Profilbild'
        inspector:
          group: 'author'
          position: 60
          editorOptions:
            features:
              crop: true
            crop:
              aspectRatio:
                forcedAspectRatio: true
                width: 1
                height: 1

    linkedin:
      type: string
      ui:
        label: 'LinkedIn URL'
        inspector:
          group: 'social'
          position: 10

    twitter:
      type: string
      ui:
        label: 'Twitter/X URL'
        inspector:
          group: 'social'
          position: 20

    facebook:
      type: string
      ui:
        label: 'Facebook URL'
        inspector:
          group: 'social'
          position: 30
