'Caspary.Site:Document.HomePage':
  superTypes:
    'Neos.Neos:Document': true
  ui:
    label: 'Homepage'
    icon: 'icon-home'
  childNodes:
    main:
      type: 'Neos.Neos:ContentCollection'
      constraints:
        nodeTypes:
          'Neos.Neos:Content': false
          'Caspary.Site:Content.HeroSection': true
          'Caspary.Site:Content.IntroSection': true
          'Caspary.Site:Content.TextSection': true
          'Caspary.Site:Content.TwoColumnSection': true
          'Caspary.Site:Content.ServiceGrid': true

'Caspary.Site:Document.StandardPage':
  superTypes:
    'Neos.Neos:Document': true
  ui:
    label: 'Standard Page'
    icon: 'icon-file'
  childNodes:
    main:
      type: 'Neos.Neos:ContentCollection'
      defaultNodes:
        introSection:
          type: 'Caspary.Site:Content.IntroSection'
          properties:
            sectionTitle: 'Willkommen'
            subtitle: 'Hier finden Sie alle wichtigen Informationen'
            leftColumnText: '<p>Fügen Sie hier Ihren Text für die linke Spalte ein.</p>'
            rightColumnText: '<p>Fügen Sie hier Ihren Text für die rechte Spalte ein.</p>'
            columnMode: 'two-columns'

'Caspary.Site:Document.TrauerfallPage':
  superTypes:
    'Caspary.Site:Document.StandardPage': true
  ui:
    label: 'Trauerfall Page'
    icon: 'icon-heart'

'Caspary.Site:Document.SearchPage':
  superTypes:
    'Neos.Neos:Document': true
  ui:
    label: 'Search Page'
    icon: 'icon-search'
  childNodes:
    main:
      type: 'Neos.Neos:ContentCollection'