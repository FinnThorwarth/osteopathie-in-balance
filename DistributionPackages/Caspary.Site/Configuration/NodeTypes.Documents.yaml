'Caspary.Site:Document.BestattungsartenPage':
  superTypes:
    'Caspary.Site:Document.NavigationPage': true
  ui:
    label: 'Bestattungsarten Page'
    icon: 'icon-list-alt'
    group: 'special'
    inspector:
      groups:
        bestattung:
          label: 'Bestattungsart Details'
          position: 40
  properties:
    bestattungsType:
      type: string
      ui:
        label: 'Bestattungsart Type'
        inspector:
          group: 'bestattung'
          editor: 'Neos.Neos/Inspector/Editors/SelectBoxEditor'
          editorOptions:
            values:
              feuerbestattung:
                label: 'Feuerbestattung'
              erdbestattung:
                label: 'Erdbestattung'
              seebestattung:
                label: 'Seebestattung'
              waldbestattung:
                label: 'Wald-/Baumbestattung'
              ascheausstreuung:
                label: 'Ascheausstreuung'
              urnenbeisetzung:
                label: 'Urnenbeisetzung'
              anonyme:
                label: 'Anonyme Beisetzung'
              halbanonyme:
                label: 'Halbanonyme Beisetzung'
  childNodes:
    main:
      type: 'Neos.Neos:ContentCollection'

