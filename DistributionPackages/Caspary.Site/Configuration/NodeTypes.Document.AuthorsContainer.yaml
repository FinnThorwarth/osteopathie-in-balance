'Caspary.Site:Document.AuthorsContainer':
  superTypes:
    'Neos.Neos:Document': true
    'Neos.Seo:NoindexMixin': true  # Nicht von Suchmaschinen indexieren
  ui:
    label: 'Autoren-Container'
    icon: 'icon-users'
    group: 'structure'
    position: 900
    inspector:
      groups:
        visibility:
          label: 'Sichtbarkeit'
          position: 10
          icon: 'icon-eye'
  properties:
    # Standardmäßig komplett versteckt (Frontend)
    _hidden:
      type: boolean
      defaultValue: true
      ui:
        label: 'Seite verstecken'
        help:
          message: 'Diese Seite ist nur für die Backend-Verwaltung und sollte immer versteckt bleiben'

    _hiddenInIndex:
      type: boolean
      defaultValue: true
      ui:
        label: 'In Navigation verstecken'
        reloadIfChanged: true
        inspector:
          group: 'visibility'
          position: 10
        help:
          message: 'Blendet diesen Container aus der Hauptnavigation aus'

    # SEO: Nicht indexieren
    metaRobotsNoindex:
      defaultValue: true

    metaRobotsNofollow:
      defaultValue: true

    # Aus Sitemap ausschließen
    xmlSitemapPriority:
      defaultValue: 0

    xmlSitemapChangeFrequency:
      defaultValue: 'never'

    title:
      defaultValue: 'Autoren'
      ui:
        label: 'Titel'
        reloadIfChanged: true
        inspector:
          group: 'document'
          position: 10

    uriPathSegment:
      defaultValue: 'autoren'

  # Main Content Collection explizit deaktivieren
  childNodes: []
  
  # Nur Autor-Seiten als Unterseiten erlauben
  constraints:
    nodeTypes:
      '*': false
      'Neos.Neos:Document': false
      'Caspary.Site:Document.AbstractPage': false
      'Caspary.Site:Document.Page': false
      'Caspary.Site:Document.Homepage': false
      'Caspary.Site:Document.SearchPage': false
      'Caspary.Site:Document.ErrorPage': false
      'Caspary.Site:Document.JournalPage': false
      'Caspary.Site:Document.AuthorsContainer': false
      'Caspary.Site:Document.Author': true

  # Dieser Container soll nicht überall erstellt werden können
  # Nur auf oberster Ebene unter der Homepage
  options:
    silhouette: 'structure'
