Neos:
  Neos:
    nodeTypes:
      groups:
        general:
          label: 'Allgemein'
          position: 50
        text:
          label: 'Text-Module'
          position: 100
        overview:
          label: 'Übersichts-Module'
          position: 200
        media:
          label: 'Medien-Module'
          position: 300
        structure:
          label: 'Struktur'
          position: 350
        special:
          label: 'Spezial-Module'
          position: 400
    userInterface:
      defaultLanguage: de
    sites:
      '*':
        uriPathSuffix: ''
        contentDimensions:
          defaultDimensionSpacePoint:
            language: de
          resolver:
            factoryClassName: Neos\Neos\FrontendRouting\DimensionResolution\Resolver\UriPathResolverFactory
            options:
              segments:
                - dimensionIdentifier: 'language'
                  dimensionValueMapping:
                    de: ''
                    en: 'en'
    fusion:
      autoInclude:
        'Thorwarth.BaseSite': true
  ContentRepositoryRegistry:
    contentRepositories:
      default:
        contentDimensions:
          language:
            label: 'Sprache'
            icon: 'icon-language'
            defaultValue: 'de'
            values:
              de:
                label: 'Deutsch'
              en:
                label: 'English'
                generalizations:
                  - de
#     userInterface:
#       translation:
#         autoInclude:
#           'Thorwarth.BaseSite': ['Main']
  Fusion:
    defaultContext:
      Caspary.Image: 'Thorwarth\BaseSite\Eel\Helper\ImageHelper'

Thorwarth:
  BaseSite:
    mail:
      senderAddress: 'info@osteopathie-in-balance.de'
      senderName: 'Osteopathie in Balance'
