'Thorwarth.BaseSite:Content.TextModule':
  superTypes:
    'Neos.Neos:Content': true
    'Thorwarth.BaseSite:Mixin.NavigationAnchor': true
  ui:
    label: 'Text Modul'
    icon: 'icon-align-left'
    group: 'smartgrund'
    inspector:
      groups:
        content:
          label: 'Inhalt'
          position: 10
        layout:
          label: 'Layout'
          position: 20
  properties:
    darkBackground:
      type: boolean
      defaultValue: false
      ui:
        label: 'Dunkler Hintergrund'
        reloadIfChanged: true
        inspector:
          group: 'layout'
          editor: 'Neos.Neos/Inspector/Editors/BooleanEditor'
    columnLayout:
      type: string
      defaultValue: 'single'
      ui:
        label: 'Spalten-Layout'
        reloadIfChanged: true
        inspector:
          group: 'layout'
          editor: 'Neos.Neos/Inspector/Editors/SelectBoxEditor'
          editorOptions:
            values:
              single:
                label: 'Einspaltig'
              double:
                label: 'Zweispaltig'

    leftColumnContent:
      type: string
      ui:
        label: 'Linke Spalte'
        reloadIfChanged: false
        inlineEditable: true
        inline:
          editorOptions:
            placeholder: 'Text eingeben...'
            autoparagraph: true
            formatting:
              p: true
              strong: true
              em: true
              u: true
              h2: true
              h3: true
              h4: true
              ul: true
              ol: true
              a: true
              sub: true
              sup: true
            linking:
              anchor: true
              title: true
              relNofollow: true
              targetBlank: true

    rightColumnContent:
      type: string
      ui:
        label: 'Rechte Spalte'
        reloadIfChanged: false
        inlineEditable: true
        inline:
          editorOptions:
            placeholder: 'Inhalt rechte Spalte...'
            autoparagraph: true
            formatting:
              p: true
              strong: true
              em: true
              u: true
              h2: true
              h3: true
              h4: true
              ul: true
              ol: true
              a: true
              sub: true
              sup: true
            linking:
              anchor: true
              title: true
              relNofollow: true
              targetBlank: true
