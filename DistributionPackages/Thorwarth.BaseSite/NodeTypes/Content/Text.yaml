'Thorwarth.BaseSite:Content.Text':
  superTypes:
    'Neos.Neos:Content': true
  ui:
    label: 'Text'
    icon: 'icon-align-left'
    position: 10
    group: 'general'
    inspector:
      groups:
        options:
          label: 'Optionen'
          position: 10
  properties:
    columnLayout:
      type: string
      defaultValue: ''
      ui:
        label: 'Spaltenaufteilung'
        reloadIfChanged: true
        inspector:
          group: 'options'
          position: 10
          editor: 'Neos.Neos/Inspector/Editors/SelectBoxEditor'
          editorOptions:
            values:
              '':
                label: 'Eine Spalte (volle Breite)'
              'two-columns':
                label: 'Zwei Spalten (50|50)'
              'three-columns':
                label: 'Drei Spalten (33|33|33)'
    textAlignment:
      type: string
      defaultValue: 'left'
      ui:
        label: 'Textausrichtung'
        reloadIfChanged: true
        inspector:
          group: 'options'
          position: 20
          editor: 'Neos.Neos/Inspector/Editors/SelectBoxEditor'
          editorOptions:
            values:
              'left':
                label: 'Links'
              'center':
                label: 'Zentriert'
    backgroundColor:
      type: string
      defaultValue: ''
      ui:
        label: 'Hintergrundfarbe'
        reloadIfChanged: true
        inspector:
          group: 'options'
          position: 30
          editor: 'Neos.Neos/Inspector/Editors/SelectBoxEditor'
          editorOptions:
            values:
              '':
                label: 'Keine'
              'olive':
                label: 'Olive Grün'
              'rose':
                label: 'Rosa'
    heading:
      type: string
      ui:
        inlineEditable: true
        inline:
          editorOptions:
            placeholder: 'Überschrift'
            formatting:
              h2: true
              h3: true
              h4: true
    subheading:
      type: string
      ui:
        inlineEditable: true
        inline:
          editorOptions:
            placeholder: 'Untertitel'
    text1:
      type: string
      ui:
        inlineEditable: true
        inline:
          editorOptions:
            placeholder: 'Text Spalte 1'
            autoparagraph: true
            formatting:
              p: true
              strong: true
              em: true
              a: true
              ul: true
              ol: true
            linking:
              anchor: true
              title: true
              relNofollow: true
              targetBlank: true
    text2:
      type: string
      ui:
        inlineEditable: true
        inline:
          editorOptions:
            placeholder: 'Text Spalte 2'
            autoparagraph: true
            formatting:
              p: true
              strong: true
              em: true
              a: true
              ul: true
              ol: true
            linking:
              anchor: true
              title: true
              relNofollow: true
              targetBlank: true
    text3:
      type: string
      ui:
        inlineEditable: true
        inline:
          editorOptions:
            placeholder: 'Text Spalte 3'
            autoparagraph: true
            formatting:
              p: true
              strong: true
              em: true
              a: true
              ul: true
              ol: true
            linking:
              anchor: true
              title: true
              relNofollow: true
              targetBlank: true
