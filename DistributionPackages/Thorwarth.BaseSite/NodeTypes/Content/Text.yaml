'Thorwarth.BaseSite:Content.Text':
  superTypes:
    'Neos.Neos:Content': true
    'Thorwarth.BaseSite:Mixin.NavigationAnchor': true
  ui:
    label: 'Text'
    icon: 'icon-align-left'
    position: 10
    group: 'general'
    inspector:
      groups:
        options:
          label: 'Optionen'
          position: 10
  properties:
    isMainHeading:
      type: boolean
      defaultValue: false
      ui:
        label: 'Haupt-Überschrift (h1/h2)'
        reloadIfChanged: true
        inspector:
          group: 'options'
          position: 5
    darkBackground:
      type: boolean
      defaultValue: false
      ui:
        label: 'Dunkler Hintergrund'
        reloadIfChanged: true
        inspector:
          group: 'options'
          position: 6
          editor: 'Neos.Neos/Inspector/Editors/BooleanEditor'
    backgroundColor:
      type: string
      defaultValue: ''
      ui:
        label: 'Hintergrundfarbe'
        reloadIfChanged: true
        inspector:
          group: 'options'
          position: 7
          editor: 'Neos.Neos/Inspector/Editors/SelectBoxEditor'
          editorOptions:
            values:
              '':
                label: 'Kein Hintergrund'
              'cream':
                label: 'Creme / Warm'
              'teal-light':
                label: 'Helles Teal'
              'gray':
                label: 'Grau'
              'blue-light':
                label: 'Hellblau'
              'beige':
                label: 'Beige / Warm'
              'rose-light':
                label: 'Rosé / Zart'
              'peach':
                label: 'Pfirsich / Hell'
    columnLayout:
      type: string
      defaultValue: ''
      ui:
        label: 'Spaltenaufteilung'
        reloadIfChanged: true
        inspector:
          group: 'options'
          position: 10
          editor: 'Neos.Neos/Inspector/Editors/SelectBoxEditor'
          editorOptions:
            values:
              '':
                label: 'Eine Spalte (volle Breite)'
              'two-columns':
                label: 'Zwei Spalten (50|50)'
              'three-columns':
                label: 'Drei Spalten (33|33|33)'
    textAlignment:
      type: string
      defaultValue: 'left'
      ui:
        label: 'Textausrichtung'
        reloadIfChanged: true
        inspector:
          group: 'options'
          position: 20
          editor: 'Neos.Neos/Inspector/Editors/SelectBoxEditor'
          editorOptions:
            values:
              'left':
                label: 'Links'
              'center':
                label: 'Zentriert'
    heading:
      type: string
      ui:
        inlineEditable: true
        inline:
          editorOptions:
            placeholder: 'Überschrift'
            formatting:
              h1: true
              h2: true
              h3: true
              h4: true
    subheading:
      type: string
      ui:
        inlineEditable: true
        inline:
          editorOptions:
            placeholder: 'Untertitel'
    textIntro:
      type: string
      ui:
        inlineEditable: true
        inline:
          editorOptions:
            placeholder: 'Einleitungstext (volle Breite, vor den Spalten)'
            autoparagraph: true
            formatting:
              p: true
              strong: true
              em: true
              a: true
              ul: true
              ol: true
            linking:
              anchor: true
              title: true
              relNofollow: true
              targetBlank: true
    text1:
      type: string
      ui:
        inlineEditable: true
        inline:
          editorOptions:
            placeholder: 'Text Spalte 1'
            autoparagraph: true
            formatting:
              p: true
              strong: true
              em: true
              a: true
              ul: true
              ol: true
            linking:
              anchor: true
              title: true
              relNofollow: true
              targetBlank: true
    text2:
      type: string
      ui:
        inlineEditable: true
        inline:
          editorOptions:
            placeholder: 'Text Spalte 2'
            autoparagraph: true
            formatting:
              p: true
              strong: true
              em: true
              a: true
              ul: true
              ol: true
            linking:
              anchor: true
              title: true
              relNofollow: true
              targetBlank: true
    text3:
      type: string
      ui:
        inlineEditable: true
        inline:
          editorOptions:
            placeholder: 'Text Spalte 3'
            autoparagraph: true
            formatting:
              p: true
              strong: true
              em: true
              a: true
              ul: true
              ol: true
            linking:
              anchor: true
              title: true
              relNofollow: true
              targetBlank: true
