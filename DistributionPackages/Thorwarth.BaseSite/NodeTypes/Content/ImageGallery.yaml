'Thorwarth.BaseSite:Content.ImageGallery':
  superTypes:
    'Neos.Neos:Content': true
    'Thorwarth.BaseSite:Mixin.NavigationAnchor': true
  ui:
    label: 'Bildergalerie'
    icon: 'icon-th'
    position: 55
    group: 'media'
    inspector:
      groups:
        images:
          label: 'Bilder'
          position: 10
        options:
          label: 'Optionen'
          position: 20
  properties:
    images:
      type: 'array<Neos\Media\Domain\Model\Asset>'
      ui:
        label: 'Bilder'
        reloadIfChanged: true
        inspector:
          group: 'images'
          position: 10
          editorOptions:
            accept: 'image/*'
    backgroundColor:
      type: string
      defaultValue: ''
      ui:
        label: 'Hintergrundfarbe'
        reloadIfChanged: true
        inspector:
          group: 'options'
          position: 5
          editor: 'Neos.Neos/Inspector/Editors/SelectBoxEditor'
          editorOptions:
            values:
              '':
                label: 'Kein Hintergrund'
              'cream':
                label: 'Creme / Warm'
              'teal-light':
                label: 'Helles Teal'
              'gray':
                label: 'Grau'
              'blue-light':
                label: 'Hellblau'
              'beige':
                label: 'Beige / Warm'
              'rose-light':
                label: 'Rosé / Zart'
              'peach':
                label: 'Pfirsich / Hell'
    columns:
      type: integer
      defaultValue: 4
      ui:
        label: 'Spalten'
        reloadIfChanged: true
        inspector:
          group: 'options'
          position: 10
          editor: 'Neos.Neos/Inspector/Editors/SelectBoxEditor'
          editorOptions:
            values:
              2:
                label: '2 Spalten'
              3:
                label: '3 Spalten'
              4:
                label: '4 Spalten'
