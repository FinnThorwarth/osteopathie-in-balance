'Thorwarth.BaseSite:Content.TwoColumnSection':
  superTypes:
    'Neos.Neos:Content': true
  label: "${node.properties.headline ? 'Abschnitt (' + node.properties.headline + ')' : 'Abschnitt'}"
  ui:
    label: 'Abschnitt mit Überschrift'
    icon: 'icon-columns'
    group: 'caspary'
    inspector:
      groups:
        content:
          label: 'Inhalt'
          position: 10
        layout:
          label: 'Layout'
          position: 15
        appearance:
          label: 'Aussehen'
          position: 20
  properties:
    columnLayout:
      type: string
      defaultValue: 'two-columns'
      ui:
        label: 'Spaltenaufteilung'
        reloadIfChanged: true
        inspector:
          group: 'layout'
          position: 10
          editor: 'Neos.Neos/Inspector/Editors/SelectBoxEditor'
          editorOptions:
            values:
              'one-column':
                label: 'Eine Spalte (volle Breite)'
              'two-columns':
                label: 'Zwei Spalten (50|50)'
    headline:
      type: string
      ui:
        label: 'Überschrift'
        reloadIfChanged: true
        inlineEditable: true
        inline:
          editorOptions:
            placeholder: 'Überschrift'


    leftContent:
      type: string
      ui:
        label: 'Inhalt linke Spalte / Hauptinhalt'
        reloadIfChanged: false
        inlineEditable: true
        inline:
          editorOptions:
            placeholder: 'Inhalt eingeben...'
            autoparagraph: true
            formatting:
              p: true
              strong: true
              em: true
              u: true
              h3: true
              ul: true
              ol: true
              a: true
            linking:
              anchor: true
              title: true
              relNofollow: true
              targetBlank: true
    rightContent:
      type: string
      ui:
        label: 'Inhalt rechte Spalte'
        reloadIfChanged: false
        inlineEditable: true
        inline:
          editorOptions:
            placeholder: 'Inhalt rechte Spalte (nur bei zwei Spalten)'
            autoparagraph: true
            formatting:
              p: true
              strong: true
              em: true
              u: true
              h3: true
              ul: true
              ol: true
              a: true
            linking:
              anchor: true
              title: true
              relNofollow: true
              targetBlank: true
    showDivider:
      type: boolean
      defaultValue: true
      ui:
        label: 'Zeige Trennlinie'
        reloadIfChanged: true
        inspector:
          group: 'appearance'
