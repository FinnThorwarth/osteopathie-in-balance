'Thorwarth.BaseSite:Content.CardSection':
  superTypes:
    'Neos.Neos:Content': true
    'Thorwarth.BaseSite:Mixin.NavigationAnchor': true
  ui:
    label: 'Karten-Sektion'
    icon: 'icon-th-large'
    position: 66
    group: 'structure'
    inspector:
      groups:
        options:
          label: 'Optionen'
          position: 10
  properties:
    backgroundColor:
      type: string
      defaultValue: ''
      ui:
        label: 'Hintergrundfarbe'
        reloadIfChanged: true
        inspector:
          group: 'options'
          position: 11
          editor: 'Neos.Neos/Inspector/Editors/SelectBoxEditor'
          editorOptions:
            values:
              '':
                label: 'Kein Hintergrund'
              'gray':
                label: 'Grau (#7A8594)'
              'cream':
                label: 'Creme / Warm'
              'teal-light':
                label: 'Helles Teal'
    # Header
    heading:
      type: string
      ui:
        inlineEditable: true
        inline:
          editorOptions:
            placeholder: 'Überschrift'
            formatting:
              h1: true
              h2: true
              h3: true
              h4: true
    subheading:
      type: string
      ui:
        inlineEditable: true
        inline:
          editorOptions:
            placeholder: 'Untertitel'
    introText:
      type: string
      ui:
        inlineEditable: true
        inline:
          editorOptions:
            placeholder: 'Einleitungstext (optional)'
            autoparagraph: true
            formatting:
              strong: true
              em: true
              a: true
            linking:
              anchor: true
              title: true
              targetBlank: true
    # Column 1
    image1:
      type: 'Neos\Media\Domain\Model\ImageInterface'
      ui:
        label: 'Bild Spalte 1'
        reloadIfChanged: true
        inspector:
          group: 'options'
          position: 20
    text1:
      type: string
      ui:
        inlineEditable: true
        inline:
          editorOptions:
            placeholder: 'Text Spalte 1'
            autoparagraph: true
            formatting:
              strong: true
              em: true
              a: true
              ul: true
              ol: true
            linking:
              anchor: true
              title: true
              targetBlank: true
    # Column 2
    image2:
      type: 'Neos\Media\Domain\Model\ImageInterface'
      ui:
        label: 'Bild Spalte 2'
        reloadIfChanged: true
        inspector:
          group: 'options'
          position: 30
    text2:
      type: string
      ui:
        inlineEditable: true
        inline:
          editorOptions:
            placeholder: 'Text Spalte 2'
            autoparagraph: true
            formatting:
              strong: true
              em: true
              a: true
              ul: true
              ol: true
            linking:
              anchor: true
              title: true
              targetBlank: true
    # Column 3
    image3:
      type: 'Neos\Media\Domain\Model\ImageInterface'
      ui:
        label: 'Bild Spalte 3'
        reloadIfChanged: true
        inspector:
          group: 'options'
          position: 40
    text3:
      type: string
      ui:
        inlineEditable: true
        inline:
          editorOptions:
            placeholder: 'Text Spalte 3'
            autoparagraph: true
            formatting:
              strong: true
              em: true
              a: true
              ul: true
              ol: true
            linking:
              anchor: true
