'Thorwarth.BaseSite:Content.CardGrid':
  superTypes:
    'Neos.Neos:Content': true
    'Neos.Neos:ContentCollection': true
    'Thorwarth.BaseSite:Mixin.NavigationAnchor': true
  constraints:
    nodeTypes:
      '*': false
      'Thorwarth.BaseSite:Content.CardGridItem': true
  ui:
    label: 'Karten-Raster'
    icon: 'icon-th-large'
    position: 65
    group: 'structure'
    inspector:
      groups:
        options:
          label: 'Optionen'
          position: 10
  properties:
    columns:
      type: integer
      defaultValue: 3
      ui:
        label: 'Spalten'
        reloadIfChanged: true
        inspector:
          group: 'options'
          position: 10
          editor: 'Neos.Neos/Inspector/Editors/SelectBoxEditor'
          editorOptions:
            values:
              2:
                label: '2 Spalten'
              3:
                label: '3 Spalten'
              4:
                label: '4 Spalten'


'Thorwarth.BaseSite:Content.CardGridItem':
  superTypes:
    'Neos.Neos:Content': true
  ui:
    label: 'Karten-Element'
    icon: 'icon-square'
    position: 10
    group: 'caspary'
    inspector:
      groups:
        card:
          label: 'Karte'
          position: 10
        link:
          label: 'Link'
          position: 20
  properties:
    illustration:
      type: 'Neos\Media\Domain\Model\ImageInterface'
      ui:
        label: 'Illustration'
        reloadIfChanged: true
        inspector:
          group: 'card'
          position: 10
    title:
      type: string
      ui:
        label: 'Titel'
        inlineEditable: true
        inline:
          editorOptions:
            placeholder: 'Titel eingeben...'
        inspector:
          group: 'card'
          position: 20
    description:
      type: string
      ui:
        label: 'Beschreibung'
        inlineEditable: true
        inline:
          editorOptions:
            placeholder: 'Beschreibung eingeben...'
        inspector:
          group: 'card'
          position: 30
          editor: 'Neos.Neos/Inspector/Editors/TextAreaEditor'
          editorOptions:
            rows: 4
    linkText:
      type: string
      defaultValue: 'Kontakt >'
      ui:
        label: 'Link-Text'
        inspector:
          group: 'link'
          position: 10
    linkUrl:
      type: string
      ui:
        label: 'Link-URL'
        inspector:
          group: 'link'
          position: 20
          editor: 'Neos.Neos/Inspector/Editors/LinkEditor'
