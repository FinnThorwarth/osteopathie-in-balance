'Thorwarth.BaseSite:Content.Headline':
  superTypes:
    'Neos.Neos:Content': true
  ui:
    label: 'Überschrift'
    icon: 'icon-header'
    position: 5
    group: 'general'
    inlineEditable: true
    inspector:
      groups:
        style:
          label: 'Stil'
          position: 10
  properties:
    title:
      type: string
      defaultValue: ''
      ui:
        inlineEditable: true
        inline:
          editorOptions:
            placeholder: 'Überschrift eingeben'
            autoparagraph: false
            formatting:
              h1: false
              h2: true
              h3: true
              h4: true
              h5: true
              h6: true
    headingSize:
      type: string
      defaultValue: 'h2'
      ui:
        label: 'Überschriftengröße'
        reloadIfChanged: true
        inspector:
          group: 'style'
          position: 10
          editor: 'Neos.Neos/Inspector/Editors/SelectBoxEditor'
          editorOptions:
            values:
              'h2':
                label: 'H2 - Hauptüberschrift'
              'h3':
                label: 'H3 - Unterüberschrift'
              'h4':
                label: 'H4 - Abschnittsüberschrift'
              'h5':
                label: 'H5 - Kleine Überschrift'
              'h6':
                label: 'H6 - Kleinste Überschrift'
    alignment:
      type: string
      defaultValue: 'left'
      ui:
        label: 'Ausrichtung'
        reloadIfChanged: true
        inspector:
          group: 'style'
          position: 20
          editor: 'Neos.Neos/Inspector/Editors/SelectBoxEditor'
          editorOptions:
            values:
              'left':
                label: 'Links'
              'center':
                label: 'Zentriert'
              'right':
                label: 'Rechts'