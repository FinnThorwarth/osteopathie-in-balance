'Thorwarth.BaseSite:Content.SectionHeader':
  superTypes:
    'Neos.Neos:Content': true
  ui:
    label: 'Abschnittsüberschrift'
    icon: 'icon-heading'
    inlineEditable: true
    inspector:
      groups:
        content:
          label: 'Inhalt'
          position: 10
  properties:
    sectionTitle:
      type: string
      ui:
        inlineEditable: true
        inline:
          editorOptions:
            placeholder: 'Seitentitel'
    subtitle:
      type: string
      ui:
        inlineEditable: true
        inline:
          editorOptions:
            placeholder: 'Untertitel'
    halfWidth:
      type: boolean
      defaultValue: false
      ui:
        label: 'Halbe Breite'
        reloadIfChanged: true
        inspector:
          group: 'content'
