'Thorwarth.BaseSite:Content.ContactForm':
  superTypes:
    'Neos.Neos:Content': true
    'Thorwarth.BaseSite:Mixin.NavigationAnchor': true
  ui:
    label: 'Kontaktformular'
    icon: 'icon-envelope'
    group: 'general'
    inspector:
      groups:
        settings:
          label: 'Einstellungen'
          position: 10
  properties:
    darkBackground:
      type: boolean
      defaultValue: false
      ui:
        label: 'Dunkler Hintergrund'
        reloadIfChanged: true
        inspector:
          group: 'settings'
          position: 5
          editor: 'Neos.Neos/Inspector/Editors/BooleanEditor'
    recipientEmail:
      type: string
      defaultValue: 'info@osteopathie-in-balance.de'
      ui:
        label: 'Empfänger E-Mail'
        reloadIfChanged: false
        inspector:
          group: 'settings'
        validation:
          'Neos.Neos/Validation/EmailAddressValidator': true
    successMessage:
      type: string
      defaultValue: 'Vielen Dank für Ihre Nachricht. Wir werden uns schnellstmöglich bei Ihnen melden.'
      ui:
        label: 'Erfolgsmeldung'
        reloadIfChanged: false
        inspector:
          group: 'settings'
          editor: 'Neos.Neos/Inspector/Editors/TextAreaEditor'