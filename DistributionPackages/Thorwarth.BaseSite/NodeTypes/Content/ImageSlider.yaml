'Thorwarth.BaseSite:Content.ImageSlider':
  superTypes:
    'Neos.Neos:Content': true
    'Thorwarth.BaseSite:Mixin.NavigationAnchor': true
  ui:
    label: 'Bildslider'
    icon: 'icon-images'
    position: 50
    group: 'media'
    inspector:
      groups:
        images:
          label: 'Bilder'
          position: 10
        options:
          label: 'Optionen'
          position: 20
  properties:
    heading:
      type: string
      ui:
        inlineEditable: true
        inline:
          editorOptions:
            placeholder: 'Überschrift (optional)'
            formatting:
              h2: true
              h3: true
              h4: true
    images:
      type: 'array<Neos\Media\Domain\Model\Asset>'
      ui:
        label: 'Bilder'
        reloadIfChanged: true
        inspector:
          group: 'images'
          position: 10
          editorOptions:
            accept: 'image/*'
    slidesPerView:
      type: integer
      defaultValue: 3
      ui:
        label: 'Bilder pro Ansicht'
        reloadIfChanged: true
        inspector:
          group: 'options'
          position: 10
          editor: 'Neos.Neos/Inspector/Editors/SelectBoxEditor'
          editorOptions:
            values:
              1:
                label: '1 Bild'
              2:
                label: '2 Bilder'
              3:
                label: '3 Bilder'
              4:
                label: '4 Bilder'
    aspectRatio:
      type: string
      defaultValue: '16-9'
      ui:
        label: 'Bildformat'
        reloadIfChanged: true
        inspector:
          group: 'options'
          position: 20
          editor: 'Neos.Neos/Inspector/Editors/SelectBoxEditor'
          editorOptions:
            values:
              '16-9':
                label: '16:9 (Breitbild)'
              '4-3':
                label: '4:3 (Standard)'
              '1-1':
                label: '1:1 (Quadrat)'
              '3-4':
                label: '3:4 (Hochformat)'
    autoplay:
      type: boolean
      defaultValue: true
      ui:
        label: 'Automatisch abspielen'
        reloadIfChanged: true
        inspector:
          group: 'options'
          position: 30
    autoplayDelay:
      type: integer
      defaultValue: 3000
      ui:
        label: 'Verzögerung (ms)'
        reloadIfChanged: true
        inspector:
          group: 'options'
          position: 40
          editorOptions:
            placeholder: '3000'
            validation:
              'Neos.Neos/Validation/IntegerValidator': []
