'Thorwarth.BaseSite:Document.JournalPage':
  superTypes:
    'Thorwarth.BaseSite:Document.AbstractPage': true
    'Thorwarth.BaseSite:Mixin.AuthorReference': true
  constraints:
    nodeTypes:
      '*': false
  ui:
    label: 'Blog-Artikel'
    icon: 'icon-newspaper'
    group: 'general'
    position: 200
    # Hide from main menu structure
    showInMenu: false
    inspector:
      groups:
        journal:
          label: 'Blog-Einstellungen'
          position: 5
          icon: 'icon-newspaper'
  properties:
    hiddenInMenu:
      type: boolean
      defaultValue: true

    previewImage:
      type: Neos\Media\Domain\Model\ImageInterface
      ui:
        label: 'Vorschaubild'
        inspector:
          group: 'image'
        reloadIfChanged: true
      previewImageAlternativeText:
        type: string
        ui:
          label: 'Alternativer Text'
          inspector:
            group: 'image'

    publicationDate:
      type: DateTime
      defaultValue: 'now'
      ui:
        label: 'Veröffentlichungsdatum'
        inspector:
          group: 'journal'
          position: 10
          editorOptions:
            format: 'd.m.Y'

    excerpt:
      type: string
      ui:
        label: 'Kurzbeschreibung'
        help:
          message: 'Wird in Übersichten und für SEO verwendet'
        inspector:
          group: 'journal'
          position: 20
          editor: 'Neos.Neos/Inspector/Editors/TextAreaEditor'
          editorOptions:
            rows: 3
            placeholder: 'Kurze Zusammenfassung des Artikels...'

    categories:
      type: string
      ui:
        label: 'Kategorien'
        help:
          message: 'Komma-getrennte Liste von Kategorien'
        inspector:
          group: 'journal'
          position: 30
          editorOptions:
            placeholder: ''

    # Override author properties to appear in Blog-Einstellungen group
    author:
      ui:
        inspector:
          group: 'journal'
          position: 40
    authorName:
      ui:
        inspector:
          group: 'journal'
          position: 50
    showAuthorCard:
      type: boolean
      defaultValue: true
      ui:
        inspector:
          group: 'journal'
          position: 60
