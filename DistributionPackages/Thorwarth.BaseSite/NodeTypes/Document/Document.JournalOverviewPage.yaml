'Thorwarth.BaseSite:Document.JournalOverviewPage':
  superTypes:
    'Thorwarth.BaseSite:Document.AbstractPage': true
  ui:
    label: 'Blog-Übersicht'
    icon: 'icon-th-list'
    group: 'structure'
    position: 190
    inspector:
      groups:
        journalSettings:
          label: 'Blog-Einstellungen'
          position: 5
          icon: 'icon-th-list'
  constraints:
    nodeTypes:
      '*': false
      'Thorwarth.BaseSite:Document.JournalPage': true
  properties:
    journalHeading:
      type: string
      defaultValue: 'BLOG'
      ui:
        label: 'Überschrift'
        inspector:
          group: 'journalSettings'
          position: 10
        inlineEditable: true

    itemsPerPage:
      type: integer
      defaultValue: 10
      ui:
        label: 'Artikel pro Seite'
        inspector:
          group: 'journalSettings'
          position: 20
          editorOptions:
            minimum: 1
            maximum: 50

    sortBy:
      type: string
      defaultValue: 'publicationDate'
      ui:
        label: 'Sortierung'
        inspector:
          group: 'journalSettings'
          position: 30
          editor: 'Neos.Neos/Inspector/Editors/SelectBoxEditor'
          editorOptions:
            allowEmpty: false
            values:
              publicationDate:
                label: 'Veröffentlichungsdatum (neueste zuerst)'
              title:
                label: 'Titel (alphabetisch)'
