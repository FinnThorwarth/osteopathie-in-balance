"Thorwarth.BaseSite:Document.ErrorPage":
  superTypes:
    "Thorwarth.BaseSite:Document.AbstractPage": true
  ui:
    label: '404 Fehlerseite'
    icon: 'icon-exclamation-triangle'
    position: 100
  properties:
    errorCode:
      type: string
      defaultValue: '404'
      ui:
        label: 'Fehlercode'
        inspector:
          group: 'error'
    errorTitle:
      type: string
      defaultValue: 'Seite nicht gefunden'
      ui:
        label: 'Fehlertitel'
        inspector:
          group: 'error'
    errorMessage:
      type: string
      defaultValue: 'Die angeforderte Seite konnte leider nicht gefunden werden.'
      ui:
        label: 'Fehlermeldung'
        inspector:
          group: 'error'
          editor: 'Neos.Neos/Inspector/Editors/TextAreaEditor'
    showSearch:
      type: boolean
      defaultValue: true
      ui:
        label: 'Suchfunktion anzeigen'
        inspector:
          group: 'error'
    showNavigation:
      type: boolean
      defaultValue: true
      ui:
        label: 'Navigation anzeigen'
        inspector:
          group: 'error'
  childNodes:
    main:
      type: "Neos.Neos:ContentCollection"
      constraints:
        nodeTypes:
          "*": false
