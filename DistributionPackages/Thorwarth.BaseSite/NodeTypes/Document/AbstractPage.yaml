"Thorwarth.BaseSite:Document.AbstractPage":
  abstract: true
  superTypes:
    "Neos.Neos:Document": true
   # "Thorwarth.BaseSite:Mixin.Image": true
   # "Thorwarth.BaseSite:Mixin.AuthorReference": true
  childNodes:
    main:
      type: "Neos.Neos:ContentCollection"
      constraints:
        nodeTypes:
          "*": false
          # Sections
          "Thorwarth.BaseSite:Content.IntroSection": true
          "Thorwarth.BaseSite:Content.TeamSection": true
          "Thorwarth.BaseSite:Content.TwoColumnSection": true
          "Thorwarth.BaseSite:Content.TextModule": true
          # "Thorwarth.BaseSite:Content.DownloadSection": true
          # Text & Headlines
          "Thorwarth.BaseSite:Content.Text": true
          # "Thorwarth.BaseSite:Content.Headline": true
          "Thorwarth.BaseSite:Content.Header": true
          # "Thorwarth.BaseSite:Content.SectionHeader": true
          "Thorwarth.BaseSite:Content.QuoteSection": true
          # Media
          "Thorwarth.BaseSite:Content.ImageSlider": true
          "Thorwarth.BaseSite:Content.ImageGallery": true
          "Thorwarth.BaseSite:Content.FullWidthImage": true
          "Thorwarth.BaseSite:Content.Image.Hero": true
          "Thorwarth.BaseSite:Content.TextImage": true
          # Interactive
          # "Thorwarth.BaseSite:Content.Accordion": true
          # "Thorwarth.BaseSite:Content.Button": true
          # "Thorwarth.BaseSite:Content.ContactForm": true
          # Cards
          "Thorwarth.BaseSite:Content.CardSection": true
          # Navigation
          # "Thorwarth.BaseSite:Content.ChildPageList": true

  constraints:
    nodeTypes:
      "Thorwarth.BaseSite:Document.Homepage": false
      "Thorwarth.BaseSite:Constraint.Document.Restricted": false

  properties:
    footerInfoLeft:
      type: string
      ui:
        inlineEditable: true
        inline:
          editorOptions:
            inlineStyling:
              linkStyle: true
            preset: "text.free"
            formatting:
              strong: true
              em: true
              sub: true
              sup: true
              p: false
              h1: false
              h2: false
              h3: false
              pre: false
              ol: true
              ul: true
              a: true
            placeholder: Footer Inhalt
    footerInfoRight:
      type: string
      ui:
        inlineEditable: true
        inline:
          editorOptions:
            inlineStyling:
              linkStyle: true
            preset: "text.free"
            formatting:
              strong: true
              em: true
              sub: true
              sup: true
              p: false
              h1: false
              h2: false
              h3: false
              pre: false
              ol: true
              ul: true
              a: true
            placeholder: Footer Inhalt
