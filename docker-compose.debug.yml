version: '3.8'

services:
  # Mailhog service for catching and viewing test emails
  mailhog:
    image: mailhog/mailhog:latest
    container_name: caspary_mailhog
    ports:
      - "1025:1025"  # SMTP server
      - "8025:8025"  # Web UI
    networks:
      - neos-app_default
    environment:
      MH_STORAGE: memory
      MH_SMTP_BIND_ADDR: 0.0.0.0:1025
      MH_API_BIND_ADDR: 0.0.0.0:8025
      MH_UI_BIND_ADDR: 0.0.0.0:8025
    restart: unless-stopped

networks:
  neos-app_default:
    external: true